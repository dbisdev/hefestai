version: '3.8'

# =============================================================================
# PRODUCTION DOCKER COMPOSE
# =============================================================================
# This file is for local production-like testing.
# In production (Fly.io), backend and genkit run separately.
# Frontend is deployed via Vercel (NOT dockerized).

services:
  # PostgreSQL Database with pgvector (LOCAL DEV ONLY)
  # In production, use Supabase with pgvector
  postgres:
    image: pgvector/pgvector:pg16
    container_name: loremaster-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-loremaster}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API (.NET 8)
  backend:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    container_name: loremaster-api
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Production}
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=${POSTGRES_DB:-loremaster};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}
      - Jwt__Secret=${JWT_SECRET}
      - Jwt__Issuer=${JWT_ISSUER:-Loremaster}
      - Jwt__Audience=${JWT_AUDIENCE:-Loremaster}
      - Jwt__AccessTokenExpirationMinutes=${JWT_ACCESS_TOKEN_EXPIRATION_MINUTES:-15}
      - Jwt__RefreshTokenExpirationDays=${JWT_REFRESH_TOKEN_EXPIRATION_DAYS:-7}
      - ServiceJwt__Secret=${SERVICE_JWT_SECRET}
      - ServiceJwt__Issuer=${SERVICE_JWT_ISSUER:-Loremaster.Api}
      - ServiceJwt__Audience=${SERVICE_JWT_AUDIENCE:-Loremaster.Genkit}
      - ServiceJwt__ExpirationMinutes=${SERVICE_JWT_EXPIRATION_MINUTES:-5}
      - GenkitService__BaseUrl=http://genkit:3000
      - GenkitService__ProductionUrl=http://genkit:3000
      - GenkitService__TimeoutSeconds=${GENKIT_SERVICE_TIMEOUT_SECONDS:-30}
      - Cors__Origins__0=${CORS_ORIGINS:-http://localhost:5173}
      - RateLimiting__EnableRateLimiting=${RATE_LIMIT_ENABLED:-true}
      - RateLimiting__PermitLimit=${RATE_LIMIT_PERMIT:-100}
      - RateLimiting__WindowSeconds=${RATE_LIMIT_WINDOW_SECONDS:-60}
    ports:
      - "${BACKEND_PORT:-5000}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      genkit:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Genkit AI Microservice
  genkit:
    build:
      context: ./src/genkit-service
      dockerfile: Dockerfile
    container_name: loremaster-genkit
    restart: unless-stopped
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=3000
      - GOOGLE_GENAI_API_KEY=${GOOGLE_GENAI_API_KEY}
      - JWT_SECRET=${SERVICE_JWT_SECRET}
      - JWT_ISSUER=${SERVICE_JWT_ISSUER:-Loremaster.Api}
      - JWT_AUDIENCE=${SERVICE_JWT_AUDIENCE:-Loremaster.Genkit}
      - ALLOWED_SCOPES=genkit.execute,genkit.admin
      - CORS_ORIGINS=http://backend:8080
      - RATE_LIMIT_WINDOW_MS=60000
      - RATE_LIMIT_MAX_REQUESTS=100
      - LOG_LEVEL=${LOG_LEVEL:-info}
    ports:
      - "${GENKIT_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
