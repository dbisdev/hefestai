# Fly.io configuration for Loremaster .NET Backend API
# =============================================================================
# DEPLOYMENT STEPS:
# 1. Create the app: fly apps create loremaster-api
# 2. Set secrets (see below)
# 3. Deploy: fly deploy --config src/backend/fly.toml
# =============================================================================
#
# REQUIRED SECRETS (set with: fly secrets set KEY=VALUE):
# - ConnectionStrings__SupabaseConnection: Supabase pooled connection string
#   Example: Host=db.xxxxx.supabase.co;Port=6543;Database=postgres;Username=postgres.xxxxx;Password=xxxxx;SSL Mode=Require;Trust Server Certificate=true;Pooling=true
# - Jwt__Secret: JWT secret for user authentication (min 32 chars)
# - ServiceJwt__Secret: Service-to-service JWT secret (min 32 chars)
# - Cors__Origins__0: Frontend URL (e.g., https://your-app.vercel.app)
#
# OPTIONAL SECRETS:
# - Cors__Origins__1, Cors__Origins__2, etc.: Additional allowed origins

app = "loremaster-api"
primary_region = "mad"

[build]
  dockerfile = "Dockerfile"

[env]
  ASPNETCORE_ENVIRONMENT = "Production"
  ASPNETCORE_URLS = "http://+:8080"
  # Genkit internal service URL (Fly.io private networking)
  GenkitService__ProductionUrl = "http://loremaster-genkit.internal:3000"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "connections"
    hard_limit = 100
    soft_limit = 80

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[checks]
  [checks.health]
    type = "http"
    port = 8080
    path = "/health/live"
    interval = "30s"
    timeout = "5s"
    grace_period = "15s"
